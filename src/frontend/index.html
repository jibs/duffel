<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>duffel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-header">
        <h1>duffel</h1>
      </div>
      <div class="sidebar-create-actions">
        <button id="btn-new-file" title="Create new file">New file</button>
        <button id="btn-new-folder" title="Create new folder">New folder</button>
      </div>
      <div id="search-bar">
        <input type="text" id="search-input" placeholder="Search notes...">
      </div>
      <div id="file-tree"></div>
    </nav>
    <main id="content">
      <div id="breadcrumb"></div>
      <div id="view-file" class="view hidden">
        <div id="file-toolbar">
          <button id="btn-edit">Edit</button>
          <button id="btn-archive">Archive</button>
          <button id="btn-delete">Delete</button>
        </div>
        <div id="file-rendered"></div>
      </div>
      <div id="view-editor" class="view hidden">
        <div id="editor-toolbar">
          <button id="btn-save">Save</button>
          <button id="btn-cancel">Cancel</button>
        </div>
        <div id="editor-panels">
          <textarea id="editor-source"></textarea>
          <div id="editor-preview"></div>
        </div>
      </div>
      <div id="view-journal" class="view hidden">
        <div id="journal-entries"></div>
        <div id="journal-append">
          <textarea id="journal-input" placeholder="Add a new entry..."></textarea>
          <button id="btn-journal-append">Append</button>
        </div>
      </div>
      <div id="view-dir" class="view hidden">
        <div id="dir-toolbar">
          <button id="btn-agent-snippet" title="Copy agent snippet for this project">Copy Agent Snippet</button>
        </div>
        <div id="dir-listing"></div>
      </div>
      <div id="view-search" class="view hidden">
        <div id="search-toolbar">
          <div id="search-query-row">
            <input type="text" id="search-query-input" placeholder="Search...">
            <button id="btn-search" class="primary">Search</button>
          </div>
          <div id="search-filters">
            <label>Per page
              <select id="search-limit">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
              </select>
            </label>
            <label>Intent
              <input type="text" id="search-intent" placeholder="e.g. software optimization">
            </label>
            <label>Candidate limit
              <input type="number" id="search-candidate-limit" min="1" step="1" placeholder="40">
            </label>
            <label>Min score
              <input type="number" id="search-min-score" min="0" max="1" step="0.01" placeholder="0">
            </label>
            <label class="checkbox">Explain
              <input type="checkbox" id="search-explain">
            </label>
          </div>
        </div>
        <div id="search-results"></div>
        <div id="search-pagination">
          <span id="search-showing"></span>
          <div id="search-page-buttons">
            <button id="btn-search-prev" disabled>Prev</button>
            <button id="btn-search-next" disabled>Next</button>
          </div>
        </div>
      </div>
      <div id="view-empty" class="view">
        <p class="empty-state">Select a note or folder from the sidebar.</p>
      </div>
    </main>
  </div>
  <script src="/lib/marked.min.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
